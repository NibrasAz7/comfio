version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - pip install --upgrade pip
    - pip install -e . -r docs-requirements.txt
    - mkdocs build --strict --site-dir $READTHEDOCS_OUTPUT/html

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs-requirements.txt
    - method: pip
      path: .
